# Snapdragon Profiler CLI Configuration
# Lines starting with # or ; are comments

# ---------------------------------------------------------------------------
# Working Directory
# ---------------------------------------------------------------------------
# Base directory used to resolve relative paths in -sdp, -output and the
# DCSdpPath / DCOutputDir settings below.
# Set this to the folder from which you normally run the bat / exe.
# Example: WorkingDirectory=D:\snapdragon
WorkingDirectory=D:\snapdragon

# App Settings
# Package name of the app to profile
PackageName=com.ea.gp.fcmnova

# Activity name (without package prefix)
# Leave empty to show activity selection menu
ActivityName=com.ea.frostbite.engine.runtime.main.FrostbiteActivity

# Or use activity index (1, 2, 3...) instead of name
# 0 = show selection menu
# ActivityIndex=2

# Rendering API
# 0=None(auto), 1=DirectX11, 2=DirectX12, 4=OpenCL, 8=OpenGL, 16=Vulkan
RenderingAPI=16

# Capture Type
# 1=Realtime, 2=Trace, 4=Snapshot, 8=Sampling
# Note: Use Snapshot (4) for single-frame capture
CaptureType=4

# Auto-start capture after launching app
# true = automatically capture frame after app launches (RECOMMENDED for unstable apps)
# false = wait for user to press ENTER before capturing
AutoStartCapture=false

# SDPCore Log Level
# Controls verbosity of SDPCore internal logging
# Values: DEBUG (most verbose), INFO, WARN, ERROR, OFF (no logs)
# Default: DEBUG (recommended for troubleshooting)
LogLevel=DEBUG

# ---------------------------------------------------------------------------
# Metrics
# ---------------------------------------------------------------------------
# Set to false to disable all GPU counter activation during snapshot capture.
# This reduces profiler layer memory pressure on the phone (~1GB+).
# DrawCallMetrics.csv will not be generated when disabled.
# Default: true
EnableMetrics=false

# Vulkan SDK Path (used for spirv-cross shader decompilation)
# Points to the root of the Vulkan SDK installation, e.g.:
#   Windows: C:\VulkanSDK\1.4.341.1
# If left empty, the VULKAN_SDK environment variable will be tried.
# spirv-cross is expected at: {VulkanSDKPath}\Bin\spirv-cross.exe
VulkanSDKPath=C:\VulkanSDK\1.4.341.1

# Shader decompilation output format (requires VulkanSDKPath / spirv-cross)
# Options: hlsl, glsl, both
# Default: hlsl
ShaderOutputFormat=hlsl

# ---------------------------------------------------------------------------
# Analysis mode (analysis) — report-only shortcut
# ---------------------------------------------------------------------------
# When true, skip Step 1.5 (shader/texture extraction) and Step 2 (LLM labeling).
# Labels are reloaded from the most recent DrawCallAnalysis_*.csv in the session
# folder, so a full run must have been done at least once before.
# Useful for quickly re-generating the summary after tweaking ReportMode or LLM settings.
# true  = skip extraction + labeling, reload labels from existing CSV
# false = run full pipeline (default)
AnalysisOnlyGenerateReport=false

# Rotate landscape screenshots 90 degrees clockwise in reports.
# When true: if the snapshot image width > height it will be rotated so the
# frame appears upright in Markdown viewers (common for mobile captures).
# Default: true
SnapshotRotateLandscape=true

# ---------------------------------------------------------------------------
# Analysis mode (analysis)
# ---------------------------------------------------------------------------
# Which CommandBuffer to analyse (1-based, matches GUI's 1.X numbering).
# Set to 0 (or -1) to analyse ALL command buffers.
# Default: 1 (first primary CommandBuffer only)
AnalysisCmdBufferIndex=1

# Comma-separated list of DC category labels used for labeling draw calls.
AnalysisCategories=Scene,Terrain,Character,Scene(Shadow),Terrain(Shadow),Character(Shadow),PostProcess,VFX,UI,Other

# Report generation mode for the Markdown summary (Step 4).
# llm      = use LLM to write the bottleneck conclusion for each top DC (requires LlmApiEndpoint)
# fallback = use built-in rule-based bottleneck text (no LLM required)
# Default: llm
ReportMode=llm

# Path to Snapdragon Profiler metrics CSV (DrawCall-level export).
# Auto-discovery always runs first: looks for a matching CSV next to the SDP file,
# then in a sibling sdp/ subfolder. This value is only used as a fallback when
# no CSV is found automatically — useful if the metrics file is in a fixed location.
# Leave empty to rely entirely on auto-discovery.
AnalysisMetricsCSV=

# ---------------------------------------------------------------------------
# LLM-based DrawCall Labeling (analysis mode Step 2)
# ---------------------------------------------------------------------------
# When configured, the LLM reads extracted HLSL/GLSL shader code for each draw
# call and classifies it into one of the AnalysisCategories above.
# Supports any OpenAI-compatible Chat Completions API (OpenAI, Azure, DeepSeek, etc.).
#
# Full URL of the chat/completions endpoint:
# Examples:
#   OpenAI:   https://api.openai.com/v1/chat/completions
#   DeepSeek: https://api.deepseek.com/chat/completions
#   Azure:    https://<resource>.openai.azure.com/openai/deployments/<deploy>/chat/completions?api-version=2024-02-01
LlmApiEndpoint=https://corp-prod-eadp-ai-genai-gateway.data.ea.com/v1/chat/completions

# API key / Bearer token
LlmApiKey=sk-Or8Xl9Dmvc1L2xUUWuOlbQ

# Model name sent in the request body.
# Use the model ID as shown in the gateway's chat completions example (azure_ai/ prefix for Azure models).
# Run: curl https://corp-prod-eadp-ai-genai-gateway.data.ea.com/v1/models -H "Authorization: Bearer <key>"
# to list all available model IDs.
LlmModel=vertex_ai/gemini-2.0-flash-lite-001

# Maximum characters of shader source sent per file (trims very large shaders)
LlmMaxShaderChars=20000

# HTTP timeout for each LLM call in seconds
LlmTimeoutSeconds=60

# Maximum number of output tokens the LLM may generate per DC analysis.
# Increase if the conclusion is being cut off (e.g. 1200 or 2000).
# Default: 800
LlmMaxOutputTokens=5000

# ---------------------------------------------------------------------------
# DrawCall Analysis (dcanalysis mode)
# ---------------------------------------------------------------------------
# Which DrawCall to analyze. Supports two formats:
#   Positional (1-based index into the DrawCall list): DCDrawCallIndex=100
#   Encoded ID (same as GUI, submit.cmdBuf.drawcall):  DCDrawCallIndex=1.1.31
DCDrawCallIndex=1.1.12

# Default SDP file to analyze when -sdp is not passed on the command line.
# Accepts absolute paths, or relative paths based on WorkingDirectory above.
# Example: DCSdpPath=sdpcli/test/2026-03-27T19-07-48.sdp
DCSdpPath=

# Output directory for extracted shaders and textures.
# Accepts absolute paths, or relative paths based on WorkingDirectory above.
# Leave empty to use <sdp_dir>/dc{index}_output/
DCOutputDir=

# Maximum number of textures to extract (default: 20).
# All bound textures are listed in the markdown report regardless of this limit.
# Increase if you want to extract more (e.g. DCTextureLimit=50).
DCTextureLimit=200

# Only regenerate the Markdown report, skipping shader and texture extraction.
# Useful when shaders/textures are already extracted from a previous run.
# true  = skip Step 5 (shader extraction) and Step 6 (texture extraction)
# false = run full pipeline (default)
DCOnlyGenerateReport=false


